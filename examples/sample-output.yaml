work:
  title: 雾港来信
  adaptationStyle: cinematic
  logline: 围绕“迟到的渡船”开启的事件一路推进到“雾中的钟声”，人物在连续冲突中完成选择。
  sourceChapterCount: 3
  generatedBy: api:gpt-4.1-mini
adaptationPlan:
  premise: 围绕“迟到的渡船”开启的事件一路推进到“雾中的钟声”，人物在连续冲突中完成选择。
  tone: 偏影视化悬疑，重画面、动作和钩子
  targetAudience: 需要快速判断改编方向的小说作者、短剧编剧和内容策划
  structure:
    - 迟到的渡船：拆为 2 个场景，保留章节事件并补足戏剧节奏。
    - 被撕掉的账册：拆为 2 个场景，保留章节事件并补足戏剧节奏。
    - 雾中的钟声：拆为 2 个场景，保留章节事件并补足戏剧节奏。
  nextRevisionFocus:
    - 逐场确认人物动机是否清楚。
    - 把 source.excerpt 中的叙述句继续改成可拍摄动作。
    - 优先打磨 highConflictSceneIds 中的场尾钩子。
